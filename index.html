<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Gemini Nano Custom Viewer(chrome only)</title>
    <style>
        body { font-family: sans-serif; max-width: 800px; margin: 20px auto; display: flex; flex-direction: column; height: 90vh; }
        #chat-window { flex-grow: 1; border: 1px solid #ccc; overflow-y: auto; padding: 10px; margin-bottom: 10px; background: #f9f9f9; }
        .msg { margin: 8px 0; padding: 8px; border-radius: 5px; }
        .user { background: #e3f2fd; align-self: flex-end; }
        .ai { background: #f1f8e9; }
        .controls { display: flex; gap: 10px; margin-bottom: 10px; }
        textarea { width: 100%; height: 60px; }
    </style>
</head>
<body>
    <h2>Gemini Nano Viewer(chrome only) you might want to open console</h2>
    
    <div class="controls">
        <button onclick="saveToFile()">Save JSON</button>
        <input type="file" id="fileInput" style="display:none" onchange="loadFromFile(event)">
        <button onclick="document.getElementById('fileInput').click()">Load JSON</button>
        <button onclick="clearChat()">Clear Chat</button>
    </div>

    <div id="chat-window"></div>

    <div style="display: flex; gap: 5px;">
        <textarea id="userInput" placeholder="Ask something (Coding: Temp 0.2, Creative: 1.0)"></textarea>
        <button id="sendBtn" onclick="askAI()">Send</button>
    </div>

    <script>
        let chatHistory = JSON.parse(localStorage.getItem('nano_chat')) || [];
        let aiSession = null;

        // Initialize session & load history
        window.onload = async () => {
            renderChat();
            const { available } = await window.ai.languageModel.capabilities();
            if (available !== "readily") return alert("Gemini Nano not ready. Check chrome://flags");
            aiSession = await window.ai.languageModel.create({ temperature: 0.3, topK: 15 });
        };

        async function askAI() {
            const input = document.getElementById('userInput');
            const text = input.value.trim();
            if (!text || !aiSession) return;

            addMessage('user', text);
            input.value = '';

            const aiMsgDiv = addMessage('ai', '...');
            let fullResponse = "";

            try {
                const stream = aiSession.promptStreaming(text);
                for await (const chunk of stream) {
                    fullResponse = chunk; // chunk is the full text so far in Chrome's API
                    aiMsgDiv.innerText = fullResponse;
                    document.getElementById('chat-window').scrollTop = 99999;
                }
                chatHistory[chatHistory.length - 1].content = fullResponse;
                saveToLocal();
            } catch (e) {
                aiMsgDiv.innerText = "Error: " + e.message;
            }
        }

        function addMessage(role, content) {
            chatHistory.push({ role, content });
            return renderChat();
        }

        function renderChat() {
            const win = document.getElementById('chat-window');
            win.innerHTML = chatHistory.map(m => `<div class="msg ${m.role}"><b>${m.role}:</b> ${m.content}</div>`).join('');
            win.scrollTop = 99999;
            return win.lastElementChild;
        }

        // Persistence Logic
        function saveToLocal() { localStorage.setItem('nano_chat', JSON.stringify(chatHistory)); }

        function saveToFile() {
            const blob = new Blob([JSON.stringify(chatHistory, null, 2)], { type: 'application/json' });
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = `chat_log_${Date.now()}.json`;
            a.click();
        }

        function loadFromFile(event) {
            const reader = new FileReader();
            reader.onload = (e) => {
                chatHistory = JSON.parse(e.target.result);
                saveToLocal();
                renderChat();
            };
            reader.readAsText(event.target.files[0]);
        }

        function clearChat() { chatHistory = []; saveToLocal(); renderChat(); }
    </script>
</body>
</html>
