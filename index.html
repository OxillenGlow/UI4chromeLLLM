<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Gemini Nano Local Viewer</title>
    <style>
        body { font-family: sans-serif; max-width: 700px; margin: 20px auto; display: flex; flex-direction: column; height: 90vh; }
        #chat-window { flex: 1; border: 1px solid #ccc; overflow-y: auto; padding: 15px; background: #fafafa; margin-bottom: 10px; }
        .msg { margin-bottom: 12px; padding: 10px; border-radius: 8px; line-height: 1.4; }
        .user { background: #e3f2fd; border-left: 5px solid #2196f3; }
        .ai { background: #f1f8e9; border-left: 5px solid #4caf50; }
        .controls { margin-bottom: 15px; display: flex; gap: 8px; }
        textarea { width: 100%; height: 80px; padding: 10px; box-sizing: border-box; }
    </style>
</head>
<body>

    <div class="controls">
        <button onclick="saveToFile()">Export JSON</button>
        <input type="file" id="fileInput" style="display:none" onchange="loadFromFile(event)">
        <button onclick="document.getElementById('fileInput').click()">Import JSON</button>
        <button onclick="clearChat()">Clear LocalStorage</button>
    </div>

    <div id="chat-window"></div>

    <div style="display: flex; flex-direction: column; gap: 8px;">
        <textarea id="userInput" placeholder="Ask Gemini Nano..."></textarea>
        <button id="sendBtn" onclick="askAI()" style="padding: 10px; cursor: pointer;">Send Prompt</button>
    </div>

    <script>
        let chatHistory = JSON.parse(localStorage.getItem('nano_chat')) || [];
        let session = null;

        // Initialize session on load
        async function init() {
            renderChat();
            if (!window.ai || !window.ai.languageModel) {
                return alert("Prompt API not found. Enable 'Prompt API for Gemini Nano' in chrome://flags.");
            }
            const caps = await window.ai.languageModel.capabilities();
            if (caps.available !== "readily") return alert("Model not ready. Status: " + caps.available);
            
            // Set for "Smart/Coding" logic
            session = await window.ai.languageModel.create({ temperature: 0.2, topK: 15 });
        }

        async function askAI() {
            const input = document.getElementById('userInput');
            const text = input.value.trim();
            if (!text || !session) return;

            addMessage('user', text);
            input.value = '';

            const aiMsgDiv = addMessage('ai', 'Thinking...');
            let fullResponse = "";

            try {
                const stream = session.promptStreaming(text);
                for await (const chunk of stream) {
                    // Note: Chrome's Prompt API often returns the cumulative response in each chunk
                    fullResponse = chunk;
                    aiMsgDiv.innerText = fullResponse;
                    document.getElementById('chat-window').scrollTop = 99999;
                }
                // Save final result to history
                chatHistory[chatHistory.length - 1].content = fullResponse;
                saveToLocal();
            } catch (err) {
                aiMsgDiv.innerText = "Error: " + err.message;
            }
        }

        function addMessage(role, content) {
            chatHistory.push({ role, content });
            return renderChat();
        }

        function renderChat() {
            const win = document.getElementById('chat-window');
            win.innerHTML = chatHistory.map(m => `<div class="msg ${m.role}"><strong>${m.role.toUpperCase()}:</strong><br>${m.content}</div>`).join('');
            win.scrollTop = 99999;
            return win.lastElementChild;
        }

        // Persistence
        function saveToLocal() { localStorage.setItem('nano_chat', JSON.stringify(chatHistory)); }
        function clearChat() { chatHistory = []; saveToLocal(); renderChat(); }

        function saveToFile() {
            const blob = new Blob([JSON.stringify(chatHistory, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'chat_history.json';
            a.click();
        }

        function loadFromFile(event) {
            const reader = new FileReader();
            reader.onload = (e) => {
                chatHistory = JSON.parse(e.target.result);
                saveToLocal();
                renderChat();
            };
            reader.readAsText(event.target.files[0]);
        }

        // Run init
        init();
    </script>
</body>
</html>
